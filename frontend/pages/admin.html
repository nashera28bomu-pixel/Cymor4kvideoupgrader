<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel — Rumion Novel Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/main.css"/>
</head>
<body>
  <div class="petals-container" id="petals"></div>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="/index.html" class="nav-logo"><span class="logo-icon">🌹</span><span class="logo-text">Rumion <em>Novel Hub</em></span></a>
      <div class="nav-links">
        <a href="/pages/discover.html">Discover</a>
        <a href="/pages/admin.html" style="color:var(--crimson);">Admin</a>
      </div>
      <div class="nav-user" id="nav-user" style="display:none">
        <span id="nav-username" class="nav-username"></span>
        <span id="nav-role" class="role-badge"></span>
        <button class="btn-ghost" onclick="logout()">Sign Out</button>
      </div>
    </div>
  </nav>

  <div class="page-wrap">
    <h1 style="font-family:var(--ff-display);font-size:2rem;color:var(--crimson);margin-bottom:2rem;">🛡️ Admin Panel</h1>

    <!-- Stats -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="num" id="s-novels">—</div><div class="label">Published</div></div>
      <div class="stat-card"><div class="num" id="s-pending">—</div><div class="label">Pending Review</div></div>
      <div class="stat-card"><div class="num" id="s-users">—</div><div class="label">Users</div></div>
      <div class="stat-card"><div class="num" id="s-chapters">—</div><div class="label">Chapters</div></div>
    </div>

    <!-- Tabs -->
    <div style="display:flex;gap:0.75rem;margin-bottom:2rem;flex-wrap:wrap;">
      <button class="admin-nav-link active" onclick="switchTab('pending', this)">⏳ Pending Review</button>
      <button class="admin-nav-link" onclick="switchTab('all', this)">📚 All Novels</button>
      <button class="admin-nav-link" onclick="switchTab('seed', this)">🌐 Import Classics</button>
    </div>

    <div id="tab-content"></div>
  </div>

  <!-- Reject reason modal -->
  <div class="modal-overlay" id="reject-modal">
    <div class="modal" style="max-width:420px;">
      <button onclick="closeModal('reject-modal')" style="position:absolute;top:1rem;right:1.25rem;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--text-soft);">✕</button>
      <h3 style="font-family:var(--ff-display);color:var(--crimson);margin-bottom:1.25rem;">Reject Novel</h3>
      <input type="hidden" id="reject-novel-id"/>
      <div class="form-group"><label>Reason (optional)</label><textarea id="reject-reason" rows="3" placeholder="e.g. Inappropriate content, incomplete story…"></textarea></div>
      <button class="btn-primary" style="width:100%;background:var(--crimson);" onclick="confirmReject()">Confirm Rejection</button>
    </div>
  </div>

  <div class="toast-container" id="toasts"></div>

  <script type="module">
    import { apiFetch, getUser, isLoggedIn, updateNavAuth, logout } from '/js/api.js';
    window.logout = logout;

    if (!isLoggedIn()) window.location.href = '/pages/login.html';
    const user = getUser();
    if (user?.role !== 'admin') window.location.href = '/index.html';

    document.addEventListener('DOMContentLoaded', async () => {
      updateNavAuth();
      spawnPetals();
      loadStats();
      switchTab('pending', document.querySelector('.admin-nav-link'));
    });

    function spawnPetals() {
      const c=document.getElementById('petals');
      const p=document.createElement('div');p.className='petal';p.textContent='🌹';
      p.style.cssText='left:92vw;animation-delay:3s;animation-duration:16s;font-size:14px;opacity:0.1;';c.appendChild(p);
    }

    async function loadStats() {
      try {
        const { stats } = await apiFetch('/admin/stats');
        document.getElementById('s-novels').textContent   = stats.total_novels || 0;
        document.getElementById('s-pending').textContent  = stats.pending_reviews || 0;
        document.getElementById('s-users').textContent    = stats.total_users || 0;
        document.getElementById('s-chapters').textContent = stats.total_chapters || 0;
      } catch {}
    }

    window.switchTab = (tab, el) => {
      document.querySelectorAll('.admin-nav-link').forEach(b=>b.classList.remove('active'));
      el.classList.add('active');
      if (tab==='pending')  loadPending();
      else if (tab==='all') loadAll();
      else if (tab==='seed') loadSeed();
    };

    async function loadPending() {
      const c = document.getElementById('tab-content');
      c.innerHTML='<p style="color:var(--text-soft);font-style:italic;">Loading…</p>';
      try {
        const { novels } = await apiFetch('/admin/pending');
        if (!novels.length) { c.innerHTML='<p style="text-align:center;color:var(--text-soft);font-style:italic;padding:3rem;">🎉 No pending novels! All clear.</p>'; return; }
        c.innerHTML = novels.map(n=>`
          <div class="approval-card">
            <div class="approval-cover">${n.cover_image?`<img src="${n.cover_image}" style="width:100%;height:100%;object-fit:cover;border-radius:6px;"/>`:'📖'}</div>
            <div class="approval-info">
              <div class="approval-title">${n.title}</div>
              <div class="approval-author">by ${n.author?.username||'Unknown'} · ${n.chapters?.length||0} chapters</div>
              <div class="approval-desc">${(n.description||'').slice(0,120)}…</div>
              <div class="approval-actions">
                <button class="btn-approve" onclick="approveNovel('${n.id}')">✅ Approve</button>
                <button class="btn-reject" onclick="openReject('${n.id}')">❌ Reject</button>
                <button class="btn-feature" onclick="featureNovel('${n.id}', true)">⭐ Feature</button>
                <a href="/pages/novel.html?id=${n.id}" target="_blank" style="font-size:0.78rem;color:var(--rose);align-self:center;">Preview →</a>
              </div>
            </div>
          </div>
        `).join('');
      } catch(err) { c.innerHTML=`<p style="color:var(--crimson);">${err.message}</p>`; }
    }

    async function loadAll() {
      const c = document.getElementById('tab-content');
      c.innerHTML='<p style="color:var(--text-soft);font-style:italic;">Loading…</p>';
      try {
        const { novels } = await apiFetch('/admin/all?limit=50');
        c.innerHTML = `
          <table style="width:100%;border-collapse:collapse;font-size:0.88rem;">
            <thead><tr style="border-bottom:2px solid var(--blush);">
              <th style="text-align:left;padding:0.6rem 0.5rem;color:var(--text-mid);">Title</th>
              <th style="text-align:left;padding:0.6rem 0.5rem;color:var(--text-mid);">Author</th>
              <th style="text-align:left;padding:0.6rem 0.5rem;color:var(--text-mid);">Status</th>
              <th style="text-align:left;padding:0.6rem 0.5rem;color:var(--text-mid);">Source</th>
              <th style="text-align:left;padding:0.6rem 0.5rem;color:var(--text-mid);">Actions</th>
            </tr></thead>
            <tbody>
              ${novels.map(n=>`
                <tr style="border-bottom:1px solid var(--blush);">
                  <td style="padding:0.6rem 0.5rem;font-family:var(--ff-display);font-weight:600;">${n.title}</td>
                  <td style="padding:0.6rem 0.5rem;color:var(--text-soft);">${n.author?.username||'System'}</td>
                  <td style="padding:0.6rem 0.5rem;"><span class="status-badge status-${n.status}">${n.status}</span></td>
                  <td style="padding:0.6rem 0.5rem;color:var(--text-soft);">${n.source}</td>
                  <td style="padding:0.6rem 0.5rem;display:flex;gap:0.4rem;">
                    ${n.status!=='approved'?`<button class="btn-approve" style="padding:0.25rem 0.7rem;font-size:0.74rem;" onclick="approveNovel('${n.id}')">✅</button>`:''}
                    <button class="btn-reject" style="padding:0.25rem 0.7rem;font-size:0.74rem;" onclick="openReject('${n.id}')">❌</button>
                    <button class="btn-feature" style="padding:0.25rem 0.7rem;font-size:0.74rem;" onclick="featureNovel('${n.id}',true)">⭐</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch(err) { c.innerHTML=`<p style="color:var(--crimson);">${err.message}</p>`; }
    }

    function loadSeed() {
      const c = document.getElementById('tab-content');
      c.innerHTML=`
        <div style="max-width:560px;">
          <h3 style="font-family:var(--ff-display);color:var(--crimson);margin-bottom:0.5rem;">📚 Import Classic Novels</h3>
          <p style="color:var(--text-soft);font-size:0.88rem;margin-bottom:1.75rem;">Two free sources — Gutenberg (full text with chapters) and Open Library (metadata + summaries, massive catalogue).</p>

          <!-- GUTENBERG -->
          <div style="border:1px solid var(--blush);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem;">
            <p style="font-weight:700;color:var(--text-dark);margin-bottom:0.75rem;">🌐 Project Gutenberg <span style="font-size:0.75rem;color:var(--text-soft);font-weight:400;">(Full text + real chapters)</span></p>
            <div class="form-group" style="margin-bottom:0.75rem;"><label>Topic</label><input type="text" id="seed-topic" placeholder="romance, mystery, adventure…"/></div>
            <div class="form-group" style="margin-bottom:0.75rem;"><label>Page # (10 books per page)</label><input type="number" id="seed-page" value="1" min="1"/></div>
            <button class="btn-primary" onclick="runSeedImport()" id="seed-btn" style="width:100%;">Import from Gutenberg</button>
          </div>

          <!-- OPEN LIBRARY -->
          <div style="border:1px solid var(--blush);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem;">
            <p style="font-weight:700;color:var(--text-dark);margin-bottom:0.75rem;">📖 Open Library <span style="font-size:0.75rem;color:var(--text-soft);font-weight:400;">(Huge catalogue — summaries & covers)</span></p>
            <div class="form-group" style="margin-bottom:0.75rem;">
              <label>Subject</label>
              <select id="ol-subject">
                <option value="romance">💕 Romance</option>
                <option value="mystery">🔍 Mystery</option>
                <option value="fantasy">✨ Fantasy</option>
                <option value="historical_fiction">📜 Historical Fiction</option>
                <option value="thriller">😱 Thriller</option>
                <option value="science_fiction">🚀 Science Fiction</option>
                <option value="horror">👻 Horror</option>
                <option value="adventure">🗺️ Adventure</option>
                <option value="love_stories">❤️ Love Stories</option>
              </select>
            </div>
            <div class="form-group" style="margin-bottom:0.75rem;"><label>How many (max 20)</label><input type="number" id="ol-limit" value="8" min="1" max="20"/></div>
            <button class="btn-outline" onclick="runOpenLibrary()" id="ol-btn" style="width:100%;">Import from Open Library</button>
          </div>

          <div id="seed-result"></div>
        </div>
      `;
    }

    window.runSeedImport = async () => {
      const btn = document.getElementById('seed-btn');
      const result = document.getElementById('seed-result');
      const topic = document.getElementById('seed-topic').value.trim();
      const page  = parseInt(document.getElementById('seed-page').value)||1;
      btn.textContent='Importing…'; btn.disabled=true;
      result.innerHTML='<p style="color:var(--text-soft);font-style:italic;">Fetching from Gutenberg… (may take 30–60s for full text)</p>';
      try {
        const data = await apiFetch('/seed/import', { method:'POST', body:JSON.stringify({topic,page}) });
        result.innerHTML=`
          <div style="background:var(--blush-pale);border:1px solid var(--blush);border-radius:var(--radius);padding:1.25rem;">
            <p style="color:#1a7a3c;font-weight:700;">✅ ${data.imported} novels imported from Gutenberg</p>
            <p style="color:var(--text-soft);font-size:0.85rem;">Skipped (already exists): ${data.skipped}</p>
            ${data.errors?.length?`<p style="color:var(--crimson);font-size:0.82rem;">${data.errors.join('<br/>')}</p>`:''}
          </div>`;
        loadStats();
      } catch(err) {
        result.innerHTML=`<p style="color:var(--crimson);">${err.message}</p>`;
      }
      btn.textContent='Import from Gutenberg'; btn.disabled=false;
    };

    window.runOpenLibrary = async () => {
      const btn = document.getElementById('ol-btn');
      const result = document.getElementById('seed-result');
      const subject = document.getElementById('ol-subject').value;
      const limit   = parseInt(document.getElementById('ol-limit').value)||8;
      btn.textContent='Importing…'; btn.disabled=true;
      result.innerHTML='<p style="color:var(--text-soft);font-style:italic;">Fetching from Open Library…</p>';
      try {
        const data = await apiFetch('/seed/openlibrary', { method:'POST', body:JSON.stringify({subject,limit}) });
        result.innerHTML=`
          <div style="background:var(--blush-pale);border:1px solid var(--blush);border-radius:var(--radius);padding:1.25rem;">
            <p style="color:#1a7a3c;font-weight:700;">✅ ${data.imported} novels imported from Open Library</p>
            <p style="color:var(--text-soft);font-size:0.85rem;">Skipped (already exists): ${data.skipped}</p>
            ${data.errors?.length?`<p style="color:var(--crimson);font-size:0.82rem;">${data.errors.join('<br/>')}</p>`:''}
          </div>`;
        loadStats();
      } catch(err) {
        result.innerHTML=`<p style="color:var(--crimson);">${err.message}</p>`;
      }
      btn.textContent='Import from Open Library'; btn.disabled=false;
    };

    window.approveNovel = async (id) => {
      try {
        await apiFetch(`/admin/approve/${id}`, { method:'POST' });
        showToast('Novel approved & published! 🌹', 'success');
        loadPending(); loadStats();
      } catch(err) { showToast(err.message, 'error'); }
    };

    window.openReject = (id) => {
      document.getElementById('reject-novel-id').value = id;
      document.getElementById('reject-reason').value = '';
      document.getElementById('reject-modal').classList.add('open');
    };

    window.confirmReject = async () => {
      const id = document.getElementById('reject-novel-id').value;
      const reason = document.getElementById('reject-reason').value.trim();
      try {
        await apiFetch(`/admin/reject/${id}`, { method:'POST', body:JSON.stringify({reason}) });
        showToast('Novel rejected.', '');
        closeModal('reject-modal'); loadPending(); loadStats();
      } catch(err) { showToast(err.message, 'error'); }
    };

    window.featureNovel = async (id, featured) => {
      try {
        await apiFetch(`/admin/feature/${id}`, { method:'POST', body:JSON.stringify({featured}) });
        showToast('Featured status updated! ⭐', 'success');
      } catch(err) { showToast(err.message, 'error'); }
    };

    window.closeModal = (id) => document.getElementById(id).classList.remove('open');

    function showToast(msg, type='') {
      const c=document.getElementById('toasts');
      const t=document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg;
      c.appendChild(t); setTimeout(()=>t.remove(),3500);
    }
  </script>
</body>
</html>
