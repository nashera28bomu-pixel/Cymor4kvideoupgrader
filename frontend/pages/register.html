<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Rumion — Novel Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <div class="petals-container" id="petals"></div>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="/index.html" class="nav-logo">
        <span class="logo-icon">🌹</span>
        <span class="logo-text">Rumion <em>Novel Hub</em></span>
      </a>
    </div>
  </nav>

  <div class="page-wrap" style="display:flex;align-items:center;justify-content:center;min-height:85vh;padding-top:6rem;">
    <div class="form-card">
      <h1 class="form-title">Join Rumion 🌺</h1>
      <p class="form-subtitle">Create your account — read novels and publish your own stories</p>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="e.g. hopeless_romantic" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" />
      </div>

      <div style="background:var(--blush-pale);border:1px solid var(--blush);border-radius:var(--radius-sm);padding:0.85rem 1rem;margin-bottom:1.25rem;font-size:0.85rem;color:var(--text-mid);">
        ✨ <strong>Every account can read novels AND publish stories.</strong> Enjoy the experience.
      </div>

      <p class="form-error" id="form-error"></p>

      <button class="btn-primary form-submit" id="register-btn">Create Account</button>

      <p class="form-alt">Already have an account? <a href="/pages/login.html">Sign In</a></p>
    </div>
  </div>

  <div class="toast-container" id="toasts"></div>

  <script type="module">
    import { apiFetch, saveAuth, isLoggedIn } from '/js/api.js';

    if (isLoggedIn()) window.location.href = '/index.html';

    // Petals
    const container = document.getElementById('petals');
    ['🌸','🌹','❤️','🌷','✿'].forEach((sym, i) => {
      const p = document.createElement('div');
      p.className = 'petal'; p.textContent = sym;
      p.style.cssText = `left:${10+i*18}vw;animation-delay:${i*1.5}s;animation-duration:${11+i*2}s;font-size:${13+i*2}px;opacity:0.18;`;
      container.appendChild(p);
    });

    // Pre-select role from URL ?role=author
    const params = new URLSearchParams(location.search);
    if (params.get('role') === 'author') document.getElementById('role').value = 'author';

    const btn = document.getElementById('register-btn');
    const errEl = document.getElementById('form-error');

    async function register() {
      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('form-error');
      errEl.classList.remove('show');

      if (!username || !email || !password) {
        errEl.textContent = 'All fields are required.'; errEl.classList.add('show'); return;
      }
      if (password.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters.'; errEl.classList.add('show'); return;
      }

      btn.textContent = 'Creating account…'; btn.disabled = true;
      try {
        const { user, token } = await apiFetch('/auth/register', {
          method: 'POST',
          body: JSON.stringify({ username, email, password, role: 'member' }),
        });
        saveAuth(user, token);
        window.location.href = '/pages/discover.html';
      } catch (err) {
        errEl.textContent = err.message; errEl.classList.add('show');
        btn.textContent = 'Create Account'; btn.disabled = false;
      }
    }

    btn.addEventListener('click', register);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });
  </script>
</body>
</html>
