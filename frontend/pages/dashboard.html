<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Stories — Rumion Novel Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/main.css"/>
  <style>
    .dash-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:2.5rem;flex-wrap:wrap;gap:1rem; }
    .dash-title { font-family:var(--ff-display);font-size:2rem;color:var(--crimson); }
    .novel-row { display:flex;align-items:center;gap:1.25rem;padding:1rem 1.25rem;border:1px solid var(--blush);border-radius:var(--radius);margin-bottom:0.75rem;transition:border-color var(--transition); }
    .novel-row:hover { border-color:var(--rose-light); }
    .row-cover { width:52px;height:72px;border-radius:6px;overflow:hidden;flex-shrink:0;background:linear-gradient(160deg,var(--crimson-dark),var(--rose));display:flex;align-items:center;justify-content:center;font-size:1.5rem; }
    .row-cover img { width:100%;height:100%;object-fit:cover; }
    .row-info { flex:1;min-width:0; }
    .row-title { font-family:var(--ff-display);font-size:1rem;font-weight:700;color:var(--text-dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .row-meta { font-size:0.78rem;color:var(--text-soft);margin-top:0.2rem; }
    .row-actions { display:flex;gap:0.5rem;flex-shrink:0;flex-wrap:wrap; }
    .btn-sm { padding:0.35rem 0.85rem;font-size:0.78rem;font-weight:700;border-radius:50px;border:none;cursor:pointer;transition:all var(--transition); }
    .btn-sm-rose { background:var(--rose);color:var(--white); } .btn-sm-rose:hover{background:var(--crimson);}
    .btn-sm-outline { background:none;border:1.5px solid var(--blush);color:var(--text-mid); } .btn-sm-outline:hover{border-color:var(--rose);color:var(--rose);}
    .btn-sm-green { background:#1a7a3c;color:var(--white); } .btn-sm-green:hover{background:#155c2d;}
    .modal-overlay { position:fixed;inset:0;background:rgba(92,6,18,0.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity 0.28s; }
    .modal-overlay.open { opacity:1;pointer-events:all; }
    .modal { background:var(--white);border-radius:var(--radius-lg);padding:2.5rem;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;position:relative; }
    .modal-close { position:absolute;top:1rem;right:1.25rem;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--text-soft); }
    .chapter-row { display:flex;align-items:center;justify-content:space-between;padding:0.7rem 0.9rem;border:1px solid var(--blush);border-radius:var(--radius-sm);margin-bottom:0.5rem; }
    .chapter-row:hover { border-color:var(--rose-light); }
  </style>
</head>
<body>
  <div class="petals-container" id="petals"></div>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="/index.html" class="nav-logo"><span class="logo-icon">🌹</span><span class="logo-text">Rumion <em>Novel Hub</em></span></a>
      <div class="nav-links">
        <a href="/pages/discover.html">Discover</a>
        <a href="/pages/dashboard.html" style="color:var(--crimson);">My Stories</a>
      </div>
      <div class="nav-user" id="nav-user" style="display:none">
        <span id="nav-username" class="nav-username"></span>
        <span id="nav-role" class="role-badge"></span>
        <button class="btn-ghost" onclick="logout()">Sign Out</button>
      </div>
    </div>
  </nav>

  <div class="page-wrap">
    <div class="dash-header">
      <h1 class="dash-title">✍️ My Stories</h1>
      <button class="btn-primary" onclick="openNewNovelModal()">+ New Novel</button>
    </div>
    <div id="novels-list"><div class="novel-row skeleton" style="height:88px;"></div><div class="novel-row skeleton" style="height:88px;margin-top:0.75rem;"></div></div>
  </div>

  <!-- New Novel Modal -->
  <div class="modal-overlay" id="novel-modal">
    <div class="modal">
      <button class="modal-close" onclick="closeModal('novel-modal')">✕</button>
      <h2 style="font-family:var(--ff-display);color:var(--crimson);margin-bottom:1.5rem;" id="novel-modal-title">New Novel</h2>
      <input type="hidden" id="editing-novel-id"/>
      <div class="form-group"><label>Title *</label><input type="text" id="novel-title" placeholder="Your novel's title"/></div>
      <div class="form-group"><label>Description *</label><textarea id="novel-desc" placeholder="A compelling description…" rows="4"></textarea></div>
      <div class="form-group"><label>Cover Image</label><input type="file" id="novel-cover" accept="image/*"/></div>
      <p class="form-error" id="novel-error"></p>
      <button class="btn-primary" style="width:100%;margin-top:0.5rem;" id="save-novel-btn" onclick="saveNovel()">Create Novel</button>
    </div>
  </div>

  <!-- Chapter Modal -->
  <div class="modal-overlay" id="chapter-modal">
    <div class="modal">
      <button class="modal-close" onclick="closeModal('chapter-modal')">✕</button>
      <h2 style="font-family:var(--ff-display);color:var(--crimson);margin-bottom:1.5rem;" id="chapter-modal-title">Add Chapter</h2>
      <input type="hidden" id="chapter-novel-id"/>
      <input type="hidden" id="editing-chapter-id"/>
      <div class="form-group"><label>Chapter Title *</label><input type="text" id="chapter-title" placeholder="e.g. Chapter 1 – A New Dawn"/></div>
      <div class="form-group"><label>Content *</label><textarea id="chapter-content" placeholder="Write your chapter here…" rows="12" style="min-height:260px;"></textarea></div>
      <p class="form-error" id="chapter-error"></p>
      <button class="btn-primary" style="width:100%;margin-top:0.5rem;" id="save-chapter-btn" onclick="saveChapter()">Save Chapter</button>
    </div>
  </div>

  <!-- Chapters List Modal -->
  <div class="modal-overlay" id="chapters-modal">
    <div class="modal">
      <button class="modal-close" onclick="closeModal('chapters-modal')">✕</button>
      <h2 style="font-family:var(--ff-display);color:var(--crimson);margin-bottom:0.25rem;" id="chapters-novel-title"></h2>
      <p style="font-size:0.82rem;color:var(--text-soft);margin-bottom:1.5rem;">Chapters</p>
      <button class="btn-rose" style="margin-bottom:1.25rem;width:100%;" onclick="openAddChapter()">+ Add New Chapter</button>
      <div id="chapters-list-inner"></div>
    </div>
  </div>

  <div class="toast-container" id="toasts"></div>

  <script type="module">
    import { apiFetch, getUser, isLoggedIn, updateNavAuth, logout } from '/js/api.js';
    window.logout = logout;

    if (!isLoggedIn()) window.location.href = '/pages/login.html?redirect=/pages/dashboard.html';

    const user = getUser();
    if (user && user.role === 'reader') window.location.href = '/pages/discover.html';

    let myNovels = [];
    let currentNovel = null;

    document.addEventListener('DOMContentLoaded', async () => {
      updateNavAuth();
      spawnPetals();
      await loadMyNovels();
    });

    function spawnPetals() {
      const c=document.getElementById('petals');
      const p=document.createElement('div');p.className='petal';p.textContent='🌹';
      p.style.cssText='left:5vw;animation-delay:2s;animation-duration:14s;font-size:16px;opacity:0.12;';c.appendChild(p);
    }

    async function loadMyNovels() {
      const list = document.getElementById('novels-list');
      try {
        const { novels } = await apiFetch('/novels/author/mine');
        myNovels = novels;
        if (!novels.length) {
          list.innerHTML = `<div style="text-align:center;padding:3rem;color:var(--text-soft);font-style:italic;font-family:var(--ff-display);">No stories yet. Write your first one! 🌹</div>`;
          return;
        }
        list.innerHTML = novels.map(n => `
          <div class="novel-row">
            <div class="row-cover">${n.cover_image?`<img src="${n.cover_image}" alt="${n.title}"/>`:'📖'}</div>
            <div class="row-info">
              <div class="row-title">${n.title}</div>
              <div class="row-meta">${n.chapters?.length||0} chapters · <span class="status-badge status-${n.status}">${n.status}</span></div>
            </div>
            <div class="row-actions">
              <button class="btn-sm btn-sm-outline" onclick="openChapters('${n.id}')">Chapters</button>
              <button class="btn-sm btn-sm-outline" onclick="openEditNovel('${n.id}')">Edit</button>
              ${n.status==='draft'||n.status==='rejected'?`<button class="btn-sm btn-sm-green" onclick="submitNovel('${n.id}')">Submit</button>`:''}
            </div>
          </div>
        `).join('');
      } catch(err) {
        list.innerHTML = `<p style="color:var(--crimson);text-align:center;">${err.message}</p>`;
      }
    }

    // ── Novel CRUD
    window.openNewNovelModal = () => {
      document.getElementById('editing-novel-id').value='';
      document.getElementById('novel-title').value='';
      document.getElementById('novel-desc').value='';
      document.getElementById('novel-modal-title').textContent='New Novel';
      document.getElementById('save-novel-btn').textContent='Create Novel';
      document.getElementById('novel-error').classList.remove('show');
      openModal('novel-modal');
    };

    window.openEditNovel = (id) => {
      const n = myNovels.find(x=>x.id===id);
      if(!n) return;
      document.getElementById('editing-novel-id').value=id;
      document.getElementById('novel-title').value=n.title;
      document.getElementById('novel-desc').value=n.description||'';
      document.getElementById('novel-modal-title').textContent='Edit Novel';
      document.getElementById('save-novel-btn').textContent='Save Changes';
      openModal('novel-modal');
    };

    window.saveNovel = async () => {
      const id = document.getElementById('editing-novel-id').value;
      const title = document.getElementById('novel-title').value.trim();
      const description = document.getElementById('novel-desc').value.trim();
      const cover = document.getElementById('novel-cover').files[0];
      const errEl = document.getElementById('novel-error');
      errEl.classList.remove('show');

      if (!title || !description) { errEl.textContent='Title and description required.'; errEl.classList.add('show'); return; }

      const btn = document.getElementById('save-novel-btn');
      btn.textContent='Saving…'; btn.disabled=true;

      try {
        const fd = new FormData();
        fd.append('title', title); fd.append('description', description);
        if (cover) fd.append('cover', cover);

        if (id) {
          await apiFetch(`/novels/${id}`, { method:'PUT', body:fd, headers:{} });
          showToast('Novel updated! 🌹', 'success');
        } else {
          await apiFetch('/novels', { method:'POST', body:fd, headers:{} });
          showToast('Novel created! Start adding chapters.', 'success');
        }
        closeModal('novel-modal');
        loadMyNovels();
      } catch(err) {
        errEl.textContent=err.message; errEl.classList.add('show');
      }
      btn.textContent='Save'; btn.disabled=false;
    };

    window.submitNovel = async (id) => {
      if (!confirm('Submit this novel for admin review?')) return;
      try {
        await apiFetch(`/novels/${id}/submit`, { method:'POST' });
        showToast('Submitted for review! 🌸', 'success');
        loadMyNovels();
      } catch(err) { showToast(err.message, 'error'); }
    };

    // ── Chapters
    window.openChapters = async (novelId) => {
      currentNovel = myNovels.find(n=>n.id===novelId);
      document.getElementById('chapters-novel-title').textContent = currentNovel?.title || '';
      const inner = document.getElementById('chapters-list-inner');
      inner.innerHTML = '<p style="color:var(--text-soft);font-style:italic;text-align:center;">Loading…</p>';
      openModal('chapters-modal');

      try {
        const { chapters } = await apiFetch(`/chapters/${novelId}`) || {};
        // Fetch chapters via novel endpoint
        const { novel } = await apiFetch(`/novels/${novelId}`).catch(()=>({novel:currentNovel}));
        const chs = novel?.chapters || [];
        chs.sort((a,b)=>a.chapter_number-b.chapter_number);

        if (!chs.length) {
          inner.innerHTML='<p style="text-align:center;color:var(--text-soft);font-style:italic;">No chapters yet.</p>';
          return;
        }
        inner.innerHTML = chs.map(ch=>`
          <div class="chapter-row">
            <div>
              <span style="font-size:0.75rem;color:var(--rose);font-weight:700;margin-right:0.5rem;">Ch.${ch.chapter_number}</span>
              <span style="font-size:0.9rem;font-family:var(--ff-display);color:var(--text-dark);">${ch.title}</span>
            </div>
            <button class="btn-sm btn-sm-outline" onclick="openEditChapter('${ch.id}','${novelId}','${ch.title.replace(/'/g,"\'")}')">Edit</button>
          </div>
        `).join('');
      } catch(err) { inner.innerHTML=`<p style="color:var(--crimson);text-align:center;">${err.message}</p>`; }
    };

    window.openAddChapter = () => {
      document.getElementById('editing-chapter-id').value='';
      document.getElementById('chapter-novel-id').value=currentNovel?.id||'';
      document.getElementById('chapter-title').value='';
      document.getElementById('chapter-content').value='';
      document.getElementById('chapter-modal-title').textContent='Add Chapter';
      document.getElementById('save-chapter-btn').textContent='Add Chapter';
      closeModal('chapters-modal');
      openModal('chapter-modal');
    };

    window.openEditChapter = (chId, novelId, title) => {
      document.getElementById('editing-chapter-id').value=chId;
      document.getElementById('chapter-novel-id').value=novelId;
      document.getElementById('chapter-title').value=title;
      document.getElementById('chapter-content').value='Loading…';
      document.getElementById('chapter-modal-title').textContent='Edit Chapter';
      document.getElementById('save-chapter-btn').textContent='Save Changes';
      closeModal('chapters-modal');
      openModal('chapter-modal');
      apiFetch(`/chapters/${chId}`).then(d=>{
        document.getElementById('chapter-content').value=d.chapter?.content||'';
      }).catch(()=>{});
    };

    window.saveChapter = async () => {
      const chId   = document.getElementById('editing-chapter-id').value;
      const novelId = document.getElementById('chapter-novel-id').value;
      const title  = document.getElementById('chapter-title').value.trim();
      const content = document.getElementById('chapter-content').value.trim();
      const errEl  = document.getElementById('chapter-error');
      errEl.classList.remove('show');

      if (!title||!content) { errEl.textContent='Title and content required.'; errEl.classList.add('show'); return; }

      const btn = document.getElementById('save-chapter-btn');
      btn.textContent='Saving…'; btn.disabled=true;

      try {
        if (chId) {
          await apiFetch(`/chapters/${chId}`, { method:'PUT', body:JSON.stringify({title,content}) });
          showToast('Chapter updated! ✍️', 'success');
        } else {
          await apiFetch('/chapters', { method:'POST', body:JSON.stringify({novel_id:novelId,title,content}) });
          showToast('Chapter added! 🌹', 'success');
        }
        closeModal('chapter-modal');
        if (currentNovel) openChapters(currentNovel.id);
      } catch(err) { errEl.textContent=err.message; errEl.classList.add('show'); }
      btn.textContent='Save'; btn.disabled=false;
    };

    // ── Modal helpers
    window.openModal = (id) => document.getElementById(id).classList.add('open');
    window.closeModal = (id) => document.getElementById(id).classList.remove('open');

    document.querySelectorAll('.modal-overlay').forEach(m=>{
      m.addEventListener('click', e=>{ if(e.target===m) m.classList.remove('open'); });
    });

    function showToast(msg, type='') {
      const c=document.getElementById('toasts');
      const t=document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg;
      c.appendChild(t); setTimeout(()=>t.remove(),3500);
    }
  </script>
</body>
</html>
