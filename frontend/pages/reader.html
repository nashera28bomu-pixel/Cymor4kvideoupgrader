<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reading — Rumion Novel Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/main.css"/>
  <style>
    body { background:#1A0A0E; color:#F2E0C8; min-height:100vh; }

    .reader-topbar {
      position:sticky; top:0; z-index:50;
      background:rgba(26,10,14,0.96);
      backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(139,10,26,0.35);
      padding:0.65rem 1.25rem;
      display:flex; align-items:center; gap:0.75rem;
    }
    .back-link {
      color:var(--rose-light); font-size:0.85rem;
      white-space:nowrap; flex-shrink:0;
      display:flex; align-items:center; gap:0.3rem;
      transition:color 0.2s;
    }
    .back-link:hover { color:#fff; }
    .reader-chapter-label {
      font-family:var(--ff-display); font-size:0.82rem;
      color:rgba(242,224,200,0.6); flex:1;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      text-align:center;
    }
    .font-toggle { display:flex; gap:0.4rem; flex-shrink:0; }
    .font-btn {
      background:rgba(139,10,26,0.3); border:1px solid rgba(139,10,26,0.4);
      color:var(--rose-light); border-radius:6px;
      padding:0.28rem 0.55rem; cursor:pointer; font-size:0.82rem;
      transition:background 0.2s;
    }
    .font-btn:hover { background:rgba(139,10,26,0.6); }

    .reading-bar {
      position:fixed; top:0; left:0; height:3px;
      background:linear-gradient(90deg,var(--crimson),var(--rose));
      z-index:60; transition:width 0.15s; pointer-events:none;
    }

    .reader-body {
      max-width:700px; margin:0 auto;
      padding:2.5rem 1.5rem 9rem;
    }
    .reader-chapter-title {
      font-family:var(--ff-display);
      font-size:clamp(1.5rem,4vw,2rem);
      font-weight:700; color:var(--rose-light);
      margin-bottom:0.4rem; line-height:1.2;
    }
    .reader-novel-name {
      font-size:0.85rem; color:rgba(242,224,200,0.45);
      margin-bottom:2.5rem; font-style:italic;
    }

    /* ── THE ACTUAL READING TEXT ── */
    .reader-text {
      font-family:'Playfair Display', Georgia, serif;
      font-size:18px;
      line-height:2;
      color:#EDD8C8;
      letter-spacing:0.012em;
      word-spacing:0.05em;
    }
    .reader-text p {
      margin-bottom:1.6rem;
      text-indent:2em;
    }
    .reader-text p:first-child { text-indent:0; }
    .reader-text p:empty { display:none; }

    /* ── BOTTOM CONTROLS ── */
    .reader-controls {
      position:fixed; bottom:0; left:0; right:0; z-index:50;
      background:rgba(26,10,14,0.97);
      border-top:1px solid rgba(139,10,26,0.35);
      padding:0.9rem 1.5rem;
      display:flex; align-items:center; justify-content:space-between; gap:0.75rem;
    }
    .ctrl-btn {
      padding:0.55rem 1.25rem; border-radius:50px;
      font-weight:700; font-size:0.85rem;
      border:1.5px solid rgba(139,10,26,0.4);
      color:var(--rose-light); background:transparent;
      cursor:pointer; transition:all 0.25s;
      white-space:nowrap;
    }
    .ctrl-btn:hover:not(:disabled) { background:rgba(139,10,26,0.5); color:#fff; border-color:var(--rose); }
    .ctrl-btn:disabled { opacity:0.25; cursor:not-allowed; }
    .ctrl-btn.primary { background:var(--crimson); color:#fff; border-color:var(--crimson); }
    .ctrl-btn.primary:hover:not(:disabled) { background:var(--crimson-dark); }
    .ch-label { font-size:0.8rem; color:rgba(242,224,200,0.45); text-align:center; flex:1; }

    @media(max-width:500px) {
      .reader-body { padding:2rem 1rem 8rem; }
      .reader-text { font-size:16px; line-height:1.9; }
      .ctrl-btn { padding:0.5rem 0.9rem; font-size:0.8rem; }
    }
  </style>
</head>
<body>
  <div class="reading-bar" id="reading-bar" style="width:0%"></div>

  <div class="reader-topbar">
    <a class="back-link" id="back-link" href="/pages/discover.html">← Back</a>
    <span class="reader-chapter-label" id="chapter-label">Loading…</span>
    <div class="font-toggle">
      <button class="font-btn" onclick="changeFontSize(-1)" title="Smaller text">A−</button>
      <button class="font-btn" onclick="changeFontSize(1)"  title="Larger text">A+</button>
    </div>
  </div>

  <div class="reader-body">
    <p class="reader-novel-name" id="novel-name"></p>
    <h1 class="reader-chapter-title" id="chapter-title">Loading…</h1>
    <div class="reader-text" id="reader-text">
      <p style="color:rgba(242,224,200,0.35);font-style:italic;text-indent:0;">Fetching your story… 🌹</p>
    </div>
  </div>

  <div class="reader-controls">
    <button class="ctrl-btn" id="prev-btn" disabled onclick="navigate('prev')">← Prev</button>
    <span class="ch-label" id="ch-label"></span>
    <button class="ctrl-btn primary" id="next-btn" disabled onclick="navigate('next')">Next →</button>
  </div>

  <script type="module">
    import { apiFetch, isLoggedIn } from '/js/api.js';

    const chapterId = new URLSearchParams(location.search).get('id');
    if (!chapterId) window.location.href = '/pages/discover.html';

    let chapter = null;
    let fontSize = parseInt(localStorage.getItem('rumion_fontsize') || '18');

    document.addEventListener('DOMContentLoaded', async () => {
      applyFontSize();
      await loadChapter();
      setupScrollProgress();
    });

    async function loadChapter() {
      const textEl = document.getElementById('reader-text');
      try {
        const data = await apiFetch(`/chapters/${chapterId}`);
        chapter = data.chapter;

        document.title = `${chapter.title} — ${chapter.novel?.title} | Rumion`;
        document.getElementById('chapter-label').textContent = `${chapter.novel?.title || ''} · ${chapter.title}`;
        document.getElementById('novel-name').textContent    = chapter.novel?.title || '';
        document.getElementById('chapter-title').textContent = chapter.title;
        document.getElementById('back-link').href = `/pages/novel.html?id=${chapter.novel_id}`;
        document.getElementById('ch-label').textContent = `Ch. ${chapter.chapter_number}`;

        // ── FIX 1: Robust content renderer ──────────────────
        const raw = (chapter.content || '').trim();

        if (!raw || raw.length < 5) {
          textEl.innerHTML = '<p style="font-style:italic;opacity:0.5;text-indent:0;">This chapter has no content yet.</p>';
        } else {
          // Normalize line endings
          const normalized = raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n');

          // Split on double (or more) newlines = paragraph breaks
          let paras = normalized
            .split(/\n{2,}/)
            .map(p => p.replace(/\n/g,' ').trim())
            .filter(p => p.length > 0);

          // If only 1 "paragraph" (some texts use single \n), split on single newlines
          if (paras.length <= 1) {
            paras = normalized
              .split(/\n/)
              .map(p => p.trim())
              .filter(p => p.length > 0);
          }

          textEl.innerHTML = paras
            .map(p => `<p>${escapeHtml(p)}</p>`)
            .join('');
        }

        // Nav buttons
        if (chapter.prev_chapter) document.getElementById('prev-btn').disabled = false;
        if (chapter.next_chapter) document.getElementById('next-btn').disabled = false;

        // Save progress
        if (isLoggedIn()) {
          try {
            await apiFetch('/bookmarks/progress/save', {
              method: 'POST',
              body: JSON.stringify({ novel_id: chapter.novel_id, chapter_id: chapter.id, scroll_position: 0 }),
            });
          } catch {}
        }

        // Restore scroll
        const saved = localStorage.getItem(`scroll_${chapterId}`);
        if (saved) setTimeout(() => window.scrollTo(0, parseInt(saved)), 300);

      } catch(err) {
        textEl.innerHTML = `<p style="color:#e88;text-indent:0;">Error loading chapter: ${err.message}</p>`;
      }
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    function setupScrollProgress() {
      const bar = document.getElementById('reading-bar');
      let saveTimer;
      window.addEventListener('scroll', () => {
        const total = document.body.scrollHeight - window.innerHeight;
        const pct = total > 0 ? (window.scrollY / total) * 100 : 0;
        bar.style.width = Math.min(pct, 100) + '%';
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          localStorage.setItem(`scroll_${chapterId}`, Math.round(window.scrollY));
        }, 600);
      });
    }

    window.navigate = (dir) => {
      if (!chapter) return;
      const target = dir === 'prev' ? chapter.prev_chapter : chapter.next_chapter;
      if (target) {
        localStorage.removeItem(`scroll_${chapterId}`);
        window.scrollTo(0, 0);
        window.location.href = `/pages/reader.html?id=${target.id}`;
      }
    };

    window.changeFontSize = (delta) => {
      fontSize = Math.max(13, Math.min(28, fontSize + delta));
      localStorage.setItem('rumion_fontsize', fontSize);
      applyFontSize();
    };

    function applyFontSize() {
      document.getElementById('reader-text').style.fontSize = fontSize + 'px';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') navigate('next');
      if (e.key === 'ArrowLeft')  navigate('prev');
    });
  </script>
</body>
</html>
