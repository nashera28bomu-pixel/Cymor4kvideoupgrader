<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Rumion Novel Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="logo"><span class="heart">♥</span> Rumion</a>
      <div class="nav-links">
        <a href="home.html">Browse</a>
      </div>
    </div>
  </nav>

  <main class="page-body">
    <div class="form-card">
      <h1>Welcome back</h1>
      <p class="sub">Log in to publish and manage your novels.</p>

      <div id="form-alert"></div>

      <form id="login-form">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Log in</button>
      </form>

      <div class="switch">
        New to Rumion? <a href="signup.html">Create an account</a>
      </div>
    </div>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const alertEl = document.getElementById("form-alert");
      const btn = document.getElementById("submit-btn");
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      alertEl.innerHTML = "";
      btn.disabled = true;
      btn.textContent = "Logging in…";

      try {
        const res = await api.auth.login(email, password);
        AUTH.setSession(res.token, res.user);
        showToast("Welcome back!");
        setTimeout(() => (window.location.href = "author/dashboard.html"), 400);
      } catch (err) {
        alertEl.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
        btn.disabled = false;
        btn.textContent = "Log in";
      }
    });
  </script>
</body>
</html>
