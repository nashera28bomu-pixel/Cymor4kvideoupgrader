<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add a Chapter — Rumion Novel Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="logo"><span class="heart">♥</span> Rumion</a>
      <div class="nav-links">
        <a href="../home.html">Browse</a>
        <a href="dashboard.html">Dashboard</a>
        <span data-auth-slot></span>
      </div>
      <button class="nav-toggle" aria-label="Menu">☰</button>
    </div>
  </nav>

  <main class="page-body">
    <div class="form-card editor-card">
      <h1>Add a chapter</h1>
      <p class="sub">Write your next chapter and publish it straight to your readers.</p>

      <div id="form-alert"></div>

      <form id="chapter-form">
        <div class="field">
          <label for="novel-select">Novel *</label>
          <select id="novel-select" required>
            <option value="">Loading your novels…</option>
          </select>
        </div>

        <div class="field">
          <label for="chapter-number">Chapter number</label>
          <input type="number" id="chapter-number" min="1" step="1" placeholder="e.g. 1">
        </div>

        <div class="field">
          <label for="chapter-title">Chapter title</label>
          <input type="text" id="chapter-title" placeholder="e.g. Awaken">
        </div>

        <div class="field">
          <label for="chapter-content">Content *</label>
          <textarea id="chapter-content" class="editor-textarea" required placeholder="Write or paste your chapter here… Press Enter to start a new paragraph."></textarea>
          <p style="font-size:0.8rem;color:var(--rose);margin-top:6px;">Each new line becomes its own paragraph when readers view this chapter.</p>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Publish chapter</button>
      </form>
    </div>
  </main>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/upload.js"></script>
</body>
</html>
