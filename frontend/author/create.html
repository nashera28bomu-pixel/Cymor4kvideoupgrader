<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publish a Novel — Rumion Novel Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="logo"><span class="heart">♥</span> Rumion</a>
      <div class="nav-links">
        <a href="../home.html">Browse</a>
        <a href="dashboard.html">Dashboard</a>
        <span data-auth-slot></span>
      </div>
      <button class="nav-toggle" aria-label="Menu">☰</button>
    </div>
  </nav>

  <main class="page-body">
    <div class="form-card" style="max-width: 560px;">
      <h1>Publish a new novel</h1>
      <p class="sub">Give your story a title, cover, and description. You can add chapters and publish it later.</p>

      <div id="form-alert"></div>

      <form id="create-form">
        <div class="field">
          <label for="title">Title *</label>
          <input type="text" id="title" required placeholder="The name of your novel">
        </div>

        <div class="field">
          <label for="description">Description</label>
          <textarea id="description" rows="4" placeholder="What's it about?"></textarea>
        </div>

        <div class="field">
          <label for="genre">Genres</label>
          <input type="text" id="genre" placeholder="Romance, Fantasy, Drama (comma separated)">
        </div>

        <div class="field">
          <label>Cover image</label>
          <div class="cover-upload">
            <div class="cover-preview" id="cover-preview">No cover</div>
            <div class="file-input-wrap">
              <input type="file" id="cover" accept="image/*">
              <p style="font-size:0.8rem;color:var(--rose);margin-top:8px;">PNG or JPG. This is uploaded to Cloudinary by the server.</p>
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Create novel</button>
      </form>
    </div>
  </main>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/upload.js"></script>
</body>
</html>
