<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rumion Novel Hub — Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div class="page-loader" id="page-loader">
    <div class="loader-heart">♥</div>
    <div class="loader-text">Rumion Novel Hub loading…</div>
  </div>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="logo"><span class="heart">♥</span> Rumion</a>
      <div class="nav-search">
        <input type="search" id="nav-search-input" placeholder="Search novels…">
      </div>
      <div class="nav-links">
        <a href="home.html" class="active">Browse</a>
        <span data-auth-slot></span>
      </div>
      <button class="nav-toggle" aria-label="Menu">☰</button>
    </div>
  </nav>

  <main class="container page-body">

    <!-- Rotating hero carousel for trending novels -->
    <section id="hero" class="hero">
      <div class="hero-empty">
        <div class="spinner"></div>
        <p>Loading trending stories…</p>
      </div>
    </section>

    <!-- External NovelHub catalog -->
    <section class="section">
      <div class="section-head">
        <h2>Trending Stories</h2>
      </div>
      <div id="trending-grid" class="grid">
        <!-- populated by home.js -->
      </div>
    </section>

    <!-- Original, user-uploaded novel feed -->
    <section class="section">
      <div class="section-head">
        <h2>Original on Rumion</h2>
        <a href="home.html#originals">Community-published stories</a>
      </div>
      <div id="novel-grid" class="grid">
        <!-- populated by home.js -->
      </div>
    </section>

  </main>

  <footer class="footer">
    Made with <span class="heart">♥</span> on Rumion Novel Hub
  </footer>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/home.js"></script>
  <script>
    setTimeout(() => document.getElementById("page-loader")?.classList.add("fade-out"), 500);
  </script>
</body>
</html>
