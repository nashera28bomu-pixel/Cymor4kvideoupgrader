<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home - Rumion Novel Hub</title>

  <link rel="stylesheet" href="assets/css/home.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- TOP NAV -->
  <header class="navbar">
    <h1 class="logo">Rumion</h1>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search novels..." />
      <button onclick="searchNovels()">Search</button>
    </div>

    <button class="author-btn" onclick="goAuthor()">
      Author Studio
    </button>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h2>Discover Worlds Beyond Reality</h2>
    <p>Romance • Fantasy • Adventure • Mystery</p>
  </section>

  <!-- FEATURED -->
  <section class="section">
    <h3>🔥 Featured Novels</h3>
    <div id="featuredList" class="grid"></div>
  </section>

  <!-- TRENDING (same API for now) -->
  <section class="section">
    <h3>📈 Trending Reads</h3>
    <div id="trendingList" class="grid"></div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <p>Made with ❤️ by Smiley Cymor</p>
    <p class="small">For Ruth — my love, my calm, my forever inspiration</p>
  </footer>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/home.js"></script>

</body>
</html>
